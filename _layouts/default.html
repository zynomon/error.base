<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  {% if page.embed-thumbnail %}<meta property="og:image" content="{{ page.embed-thumbnail | relative_url }}">{% endif %}
  {% if page.icon %}<link rel="icon" type="image/svg+xml" href="{{ page.icon | relative_url }}">{% endif %}
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/components/style.css' | relative_url }}">
  <link href="https://fonts.cdnfonts.com/css/ocr-a-extended" rel="stylesheet">
</head>
<body>
  {% if page.splash %}
  <div id="splash-screen">
    <span class="system-title">{{ page.title }}</span>
  </div>
  <script src="{{ '/components/splash.js' | relative_url }}"></script>
  {% endif %}

  <header id="site-header">
    <div class="header-bg"></div>
    <div class="header-top">
      <span class="header-title">error.os</span>
      <div class="header-controls">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="header-dot" id="header-toggle" aria-label="Toggle navigation"></button>
      </div>
    </div>
    <div class="header-nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' or page.url == '/index.html' %}class="active"{% endif %}>home</a>
      <a href="{{ '/download/' | relative_url }}" {% if page.url contains '/download' %}class="active"{% endif %}>download</a>
      <a href="{{ '/wiki/' | relative_url }}" {% if page.url contains '/wiki' %}class="active"{% endif %}>wiki</a>
      <a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about' %}class="active"{% endif %}>about us</a>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    Built with Jekyll
  </footer>

  <script>
  (function(){
    var header = document.getElementById('site-header');
    var toggleBtn = document.getElementById('header-toggle');
    var timeout;
    var forced = false;

    function expand() { if (!forced) header.classList.add('expanded'); }
    function collapse() { if (!forced) header.classList.remove('expanded'); }

    if (header) {
      header.onmouseenter = function() { clearTimeout(timeout); expand(); };
      header.onmouseleave = function() { timeout = setTimeout(collapse, 150); };
    }

    if (toggleBtn) {
      toggleBtn.onclick = function(e) {
        e.stopPropagation();
        forced = !forced;
        forced ? header.classList.add('expanded') : header.classList.remove('expanded');
      };
    }

    var themeToggle = document.getElementById('theme-toggle');
    var root = document.documentElement;
    var saved = localStorage.getItem('theme');

    function updateThemeIcon() {
      if (!themeToggle) return;
      var isLight = root.getAttribute('data-theme') === 'light';
      themeToggle.innerHTML = isLight ?
        '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>' :
        '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
    }

    if (saved === 'light') {
      root.setAttribute('data-theme', 'light');
      updateThemeIcon();
    }

    if (themeToggle) {
      themeToggle.onclick = function() {
        if (root.getAttribute('data-theme') === 'light') {
          root.removeAttribute('data-theme');
          localStorage.setItem('theme', 'dark');
        } else {
          root.setAttribute('data-theme', 'light');
          localStorage.setItem('theme', 'light');
        }
        updateThemeIcon();
      };
    }

    var COPY = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
    var CHECK = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';

    document.querySelectorAll('pre code').forEach(function(c){
      var p = c.parentElement;
      if(p.parentElement.classList.contains('code-block-wrapper')) return;
      var w = document.createElement('div');
      w.className = 'code-block-wrapper';
      p.parentNode.insertBefore(w, p);
      w.appendChild(p);
      var b = document.createElement('button');
      b.className = 'copy-btn';
      b.innerHTML = COPY;
      b.setAttribute('aria-label', 'Copy code');
      b.onclick = function(){
        navigator.clipboard.writeText(c.textContent).then(function(){
          b.innerHTML = CHECK;
          b.classList.add('copied');
          setTimeout(function(){ b.innerHTML = COPY; b.classList.remove('copied'); }, 2000);
        });
      };
      w.appendChild(b);
    });
  })();
  </script>
</body>
</html>
