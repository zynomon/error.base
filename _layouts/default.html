<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:image" content="{{ '/icon/thumb.png' | relative_url }}">
      {% if page.icon %}
        <link rel="icon" type="image/svg+xml" href="{{ '/icon/' | append: page.icon | relative_url }}">
      {% endif %}
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/components/style.css' | relative_url }}">
  <link href="https://fonts.cdnfonts.com/css/ocr-a-extended" rel="stylesheet">
  <style>
    #vanta-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      will-change: transform;
    }
    #vanta-bg canvas {
      width: 100%;
      height: 100%;
      image-rendering: crisp-edges;
    }
    .anim-toggle svg {
      stroke: var(--txt);
      width: 18px;
      height: 18px;
    }
    .anim-toggle.off svg {
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div id="nav-dim-overlay"></div>

  {% if page.splash %}
  <div id="splash-screen">
    <span class="system-title">{{ page.title }}</span>
  </div>

  <script src="{{ '/components/splash.js' | relative_url }}"></script>
  {% endif %}

  <div id="vanta-bg"></div>

  <header id="site-header">
    <div class="header-bg"></div>
    <div class="header-top">
      <span class="header-title">error.os</span>
      <div class="header-controls">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <button class="theme-toggle anim-toggle" id="anim-toggle" aria-label="Toggle animation">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
          </svg>
        </button>
        <button class="header-dot" id="header-toggle" aria-label="Toggle navigation"></button>
      </div>
    </div>
    <div class="header-nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' or page.url == '/index.html' %}class="active"{% endif %}>home</a>
      <a href="{{ '/download/' | relative_url }}" {% if page.url contains '/download' %}class="active"{% endif %}>download</a>
      <a href="https://zynomon.github.io/error.doc">wiki</a>
      <a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about' %}class="active"{% endif %}>about us</a>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
      &lt;!&gt; error.os , Apache 2.0 ©️ since 2025
  </footer>

  <script>
  (function(){
    var header = document.getElementById('site-header');
    var toggleBtn = document.getElementById('header-toggle');
    var timeout;
    var forced = false;
    var consentGiven = false;
    try {
      consentGiven = localStorage.getItem('consentGiven') === 'true';
    } catch(e) {}

    var vantaEffect = null;
    var vantaType = 'topology';
    var cores = navigator.hardwareConcurrency || 1;
    var ram = navigator.deviceMemory || 1;
    var isLowEndDevice = (cores <= 2 || ram <= 2);

    var animEnabled = true;
    try {
      if (consentGiven) {
        animEnabled = localStorage.getItem('animEnabled') !== 'false';
      } else {
        animEnabled = !isLowEndDevice;
      }
    } catch(e) {
      animEnabled = !isLowEndDevice;
    }

    var root = document.documentElement;
    var animToggle = document.getElementById('anim-toggle');
    var scriptsLoaded = false;

    function expand() { if (!forced) header.classList.add('expanded'); }
    function collapse() { if (!forced) header.classList.remove('expanded'); }

    function setBodyTransparent(transparent) {
      if (transparent) {
        document.body.style.setProperty('background', 'transparent', 'important');
      } else {
        document.body.style.setProperty('background', '', '');
      }
    }

    function requestConsent(callback) {
      if (consentGiven) {
        callback(true);
        return;
      }
      var userChoice = confirm('This will save your preferences using cookies. OK to continue, Cancel to skip.');
      if (userChoice) {
        consentGiven = true;
        try {
          localStorage.setItem('consentGiven', 'true');
        } catch(e) {}
        callback(true);
      } else {
        callback(false);
      }
    }

    function getAdaptivePoints() {
      if (isLowEndDevice) return 8;
      var width = window.innerWidth;
      if (width < 768) return 12;
      if (width < 1200) return 18;
      return 25;
    }

    function getAdaptiveSpacing() {
      if (isLowEndDevice) return 30;
      var width = window.innerWidth;
      if (width < 768) return 28;
      if (width < 1200) return 24;
      return 20;
    }

    function loadVantaScripts(callback) {
      if (scriptsLoaded) {
        callback();
        return;
      }

      var threeScript = document.createElement('script');
      threeScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
      document.head.appendChild(threeScript);

      var fogScript = document.createElement('script');
      fogScript.src = 'https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.fog.min.js';
      document.head.appendChild(fogScript);

      var topologyScript = document.createElement('script');
      topologyScript.src = 'https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.topology.min.js';
      topologyScript.onload = function() {
        scriptsLoaded = true;
        callback();
      };
      document.head.appendChild(topologyScript);
    }

    function initVanta() {
      if (!animEnabled || vantaEffect) return;

      var el = document.getElementById('vanta-bg');
      if (!el) return;

      var isLight = root.getAttribute('data-theme') === 'light';

      setBodyTransparent(true);

      if (isLight) {
        vantaType = 'fog';
        vantaEffect = VANTA.FOG({
          el: el,
          mouseControls: !isLowEndDevice,
          touchControls: !isLowEndDevice,
          gyroControls: false,
          minHeight: 200.00,
          minWidth: 200.00,
          highlightColor: 0x7f7f7f,
          midtoneColor: 0xffffff,
          lowlightColor: 0x0,
          baseColor: 0xffffff,
          blurFactor: 0.56,
          speed: 5.00,
          zoom: 1.80
        });
      } else {
        vantaType = 'topology';
        vantaEffect = VANTA.TOPOLOGY({
          el: el,
          mouseControls: false,
          touchControls: false,
          gyroControls: false,
          minHeight: 200.00,
          minWidth: 200.00,
          scale: 0.5,
          scaleMobile: 0.5,
          color: 0xffffff,
          backgroundColor: 0x0D0F12,
          points: getAdaptivePoints(),
          maxDistance: isLowEndDevice ? 12.00 : 15.00,
          spacing: getAdaptiveSpacing()
        });
      }
    }

    function destroyVanta() {
      if (vantaEffect) {
        try {
          vantaEffect.destroy();
        } catch(e) {}
        vantaEffect = null;
      }
      var el = document.getElementById('vanta-bg');
      if (el) {
        el.style.background = '';
        while (el.firstChild) {
          el.removeChild(el.firstChild);
        }
      }
      setBodyTransparent(false);
    }

    function updateVantaTheme(isLight) {
      if (!vantaEffect || !animEnabled) return;

      try {
        if (isLight && vantaType !== 'fog') {
          destroyVanta();
          initVanta();
        } else if (!isLight && vantaType !== 'topology') {
          destroyVanta();
          initVanta();
        } else if (isLight) {
          vantaEffect.setOptions({
            highlightColor: 0x7f7f7f,
            midtoneColor: 0xffffff,
            lowlightColor: 0x0,
            baseColor: 0xffffff,
            blurFactor: 0.56,
            speed: 5.00,
            zoom: 1.80
          });
        } else {
          vantaEffect.setOptions({
            color: 0xffffff,
            backgroundColor: 0x0D0F12,
            points: getAdaptivePoints(),
            maxDistance: isLowEndDevice ? 12.00 : 15.00,
            spacing: getAdaptiveSpacing()
          });
        }
      } catch(e) {
        destroyVanta();
        initVanta();
      }
    }

    function updateAnimButton() {
      if (!animToggle) return;
      if (animEnabled) {
        animToggle.classList.remove('off');
      } else {
        animToggle.classList.add('off');
      }
    }

    function startVanta() {
      if (animEnabled && !isLowEndDevice) {
        if (typeof VANTA === 'undefined') {
          loadVantaScripts(function() {
            setTimeout(initVanta, 100);
          });
        } else {
          initVanta();
        }
      } else if (isLowEndDevice) {
        animEnabled = false;
        updateAnimButton();
        console.info('Animations disabled: low-end device detected');
      }
    }

    try {
      if (consentGiven) {
        forced = localStorage.getItem('headerExpanded') === 'true';
        if (forced) header.classList.add('expanded');
        var savedAnim = localStorage.getItem('animEnabled');
        if (savedAnim !== null) {
          animEnabled = savedAnim !== 'false';
        }
      }
    } catch(e) {}

    updateAnimButton();
    startVanta();

    document.querySelectorAll('img').forEach(function(img) {
        img.addEventListener('click', function() {
            window.open(this.src, '_blank');
        });

        img.addEventListener('mousemove', function(e) {
            var rect = this.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;
            var centerX = (x / rect.width) - 0.5;
            var centerY = (y / rect.height) - 0.5;
            this.style.setProperty('--mouse-x', centerX);
            this.style.setProperty('--mouse-y', centerY);
        });

        img.addEventListener('mouseleave', function() {
            this.style.setProperty('--mouse-x', 0);
            this.style.setProperty('--mouse-y', 0);
        });
    });

    if (header) {
      header.onmouseenter = function() { clearTimeout(timeout); expand(); };
      header.onmouseleave = function() { timeout = setTimeout(collapse, 150); };
    }

    if (toggleBtn) {
      toggleBtn.onclick = function(e) {
        e.stopPropagation();
        forced = !forced;
        if (forced) {
          header.classList.add('expanded');
        } else {
          header.classList.remove('expanded');
        }
        requestConsent(function(granted) {
          if (granted) {
            try {
              localStorage.setItem('headerExpanded', forced);
            } catch(e) {}
          }
        });
      };
    }

    if (animToggle) {
      animToggle.onclick = function() {
        if (isLowEndDevice && !animEnabled) {
          if (confirm('You are on a lower-end device. It is better to not turn on animations. Turn on anyway?')) {
            animEnabled = true;
            startVanta();
            updateAnimButton();
            requestConsent(function(granted) {
              if (granted) {
                try {
                  localStorage.setItem('animEnabled', animEnabled);
                } catch(e) {}
              }
            });
          }
          return;
        }
        animEnabled = !animEnabled;
        if (animEnabled) {
          startVanta();
        } else {
          destroyVanta();
        }
        updateAnimButton();
        requestConsent(function(granted) {
          if (granted) {
            try {
              localStorage.setItem('animEnabled', animEnabled);
            } catch(e) {}
          }
        });
      };
    }

    var themeToggle = document.getElementById('theme-toggle');
    var saved = null;
    try {
      saved = consentGiven ? localStorage.getItem('theme') : null;
    } catch(e) {}

    function updateThemeIcon() {
      if (!themeToggle) return;
      var isLight = root.getAttribute('data-theme') === 'light';
      themeToggle.innerHTML = isLight ?
        '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>' :
        '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
    }

    if (saved) {
      if (saved === 'light') {
        root.setAttribute('data-theme', 'light');
      } else {
        root.removeAttribute('data-theme');
      }
    } else {
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        root.setAttribute('data-theme', 'light');
      }
    }
    updateThemeIcon();

    if (themeToggle) {
      themeToggle.onclick = function() {
        var newTheme = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        var isLight = newTheme === 'light';

        if (isLight) {
          root.setAttribute('data-theme', 'light');
        } else {
          root.removeAttribute('data-theme');
        }
        updateThemeIcon();

        if (animEnabled) {
          updateVantaTheme(isLight);
        }

        requestConsent(function(granted) {
          if (granted) {
            try {
              localStorage.setItem('theme', newTheme);
            } catch(e) {}
          }
        });
      };
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
      if (!localStorage.getItem('theme') || !consentGiven) {
        var isLight = !e.matches;
        if (isLight) {
          root.setAttribute('data-theme', 'light');
        } else {
          root.removeAttribute('data-theme');
        }
        updateThemeIcon();
        if (animEnabled) {
          updateVantaTheme(isLight);
        }
      }
    });

    var COPY = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
    var CHECK = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';

    document.querySelectorAll('pre code').forEach(function(c){
      var p = c.parentElement;
      if(p.parentElement.classList.contains('code-block-wrapper')) return;
      var w = document.createElement('div');
      w.className = 'code-block-wrapper';
      p.parentNode.insertBefore(w, p);
      w.appendChild(p);
      var b = document.createElement('button');
      b.className = 'copy-btn';
      b.innerHTML = COPY;
      b.setAttribute('aria-label', 'Copy code');
      b.onclick = function(){
        navigator.clipboard.writeText(c.textContent).then(function(){
          b.innerHTML = CHECK;
          b.classList.add('copied');
          setTimeout(function(){ b.innerHTML = COPY; b.classList.remove('copied'); }, 2000);
        });
      };
      w.appendChild(b);
    });

    (function initNavEffects() {
      var navLinks = document.querySelectorAll('.header-nav a');
      var dimOverlay = document.getElementById('nav-dim-overlay');
      var siteFavicon = document.querySelector('link[rel="icon"]')?.href || "{{ '/icon/thumb.png' | relative_url }}";

      navLinks.forEach(function(link) {
        var favicon = document.createElement('img');
        favicon.className = 'nav-favicon';
        favicon.alt = '';

        var href = link.getAttribute('href');
        var isExternal = href.startsWith('http') || href.startsWith('https');

        if (isExternal) {
          try {
            var url = new URL(href);
            favicon.src = url.origin + '/favicon.ico';
            favicon.onerror = function() {
              this.src = url.origin + '/favicon.png';
              this.onerror = function() {
                this.style.display = 'none';
              };
            };
          } catch(e) {
            favicon.src = siteFavicon;
          }
        } else {
          favicon.src = siteFavicon;
        }

        link.insertBefore(favicon, link.firstChild);

        link.addEventListener('mouseenter', function() {
          dimOverlay.classList.add('active');
          header.style.zIndex = '1001';
        });

        link.addEventListener('mouseleave', function() {
          dimOverlay.classList.remove('active');
          setTimeout(function() {
            if (!dimOverlay.classList.contains('active')) {
              header.style.zIndex = '1000';
            }
          }, 300);
        });
      });

      dimOverlay.addEventListener('click', function() {
        this.classList.remove('active');
        header.style.zIndex = '1000';
      });
    })();

  })();
  </script>
</body>
</html>
