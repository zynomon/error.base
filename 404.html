        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Nimbus Mono PS", "Courier New", monospace;
                background: #f7f6f2;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem;
                position: relative;
                overflow-x: hidden;
            }

            #vanta-bg {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 0;
            }

            @keyframes tearRed {
                0% {
                    transform: translate(0, 0) skew(0deg);
                    opacity: 0.65;
                    clip-path: inset(0 0 0 0);
                }
                15% {
                    transform: translate(-7px, -2px) skew(-4deg);
                    opacity: 0.85;
                    clip-path: inset(8% 0 70% 0);
                }
                30% {
                    transform: translate(9px, 3px) skew(6deg);
                    opacity: 0.45;
                    clip-path: inset(20% 0 40% 0);
                }
                45% {
                    transform: translate(-12px, -4px) skew(-8deg);
                    opacity: 0.75;
                    clip-path: inset(0 0 60% 0);
                }
                60% {
                    transform: translate(5px, 6px) skew(3deg);
                    opacity: 0.55;
                    clip-path: inset(40% 0 20% 0);
                }
                75% {
                    transform: translate(-6px, -1px) skew(-5deg);
                    opacity: 0.8;
                    clip-path: inset(10% 0 80% 0);
                }
                90% {
                    transform: translate(11px, -5px) skew(7deg);
                    opacity: 0.4;
                    clip-path: inset(50% 0 10% 0);
                }
                100% {
                    transform: translate(0, 0) skew(0deg);
                    opacity: 0.65;
                    clip-path: inset(0 0 0 0);
                }
            }

            @keyframes tearCyan {
                0% {
                    transform: translate(0, 0) skew(0deg);
                    opacity: 0.5;
                    clip-path: inset(0 0 0 0);
                }
                20% {
                    transform: translate(10px, 3px) skew(5deg);
                    opacity: 0.8;
                    clip-path: inset(30% 0 30% 0);
                }
                40% {
                    transform: translate(-8px, -5px) skew(-7deg);
                    opacity: 0.35;
                    clip-path: inset(0 0 65% 0);
                }
                60% {
                    transform: translate(14px, 0px) skew(8deg);
                    opacity: 0.7;
                    clip-path: inset(15% 0 50% 0);
                }
                80% {
                    transform: translate(-11px, 4px) skew(-6deg);
                    opacity: 0.45;
                    clip-path: inset(50% 0 10% 0);
                }
                100% {
                    transform: translate(0, 0) skew(0deg);
                    opacity: 0.5;
                    clip-path: inset(0 0 0 0);
                }
            }

            @keyframes tearFrag {
                0% {
                    transform: translate(0, 0) rotate(0deg);
                    opacity: 0.3;
                    clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
                }
                25% {
                    transform: translate(-5px, -4px) rotate(-2deg);
                    opacity: 0.6;
                    clip-path: polygon(0% 15%, 100% 0%, 90% 85%, 10% 100%);
                }
                50% {
                    transform: translate(8px, 6px) rotate(3deg);
                    opacity: 0.2;
                    clip-path: polygon(10% 0%, 100% 20%, 80% 100%, 0% 70%);
                }
                75% {
                    transform: translate(-9px, -2px) rotate(-4deg);
                    opacity: 0.5;
                    clip-path: polygon(0% 30%, 85% 10%, 100% 90%, 15% 80%);
                }
                100% {
                    transform: translate(0, 0) rotate(0deg);
                    opacity: 0.3;
                    clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
                }
            }

            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0;
                }
            }

            @keyframes floatShadow {
                0% {
                    text-shadow:
                        2px 2px 6px rgba(0, 0, 0, 0.08),
                        -1px -1px 3px rgba(255, 255, 255, 0.7);
                }
                50% {
                    text-shadow:
                        3px 3px 8px rgba(0, 0, 0, 0.12),
                        -2px -2px 4px rgba(255, 255, 255, 0.8);
                }
                100% {
                    text-shadow:
                        2px 2px 6px rgba(0, 0, 0, 0.08),
                        -1px -1px 3px rgba(255, 255, 255, 0.7);
                }
            }

            .wrapper {
                display: flex;
                align-items: flex-start;
                gap: 2rem;
                position: relative;
                z-index: 1;
                width: 100%;
                max-width: 1200px;
                margin: 0 auto;
            }

            .left {
                text-align: right;
                user-select: none;
                flex: 0 0 auto;
            }

            .right {
                flex: 1 1 auto;
                min-width: 0;
                max-width: 100%;
            }

            .vertical-line {
                width: 5px;
                height: 420px;
                background: #1a1a1a;
                box-shadow:
                    2px 0 6px rgba(0, 0, 0, 0.1),
                    -1px 0 1px rgba(255, 255, 255, 0.6);
                flex-shrink: 0;
            }

            .emoticon {
                font-size: clamp(60px, 12vw, 130px);
                font-weight: 900;
                letter-spacing: -0.02em;
                color: #1a1a1a;
                animation: floatShadow 3s ease-in-out infinite;
                display: inline-block;
            }

            .number-wrapper {
                position: relative;
                display: inline-block;
            }

            .number-base {
                font-size: clamp(60px, 12vw, 130px);
                font-weight: 900;
                letter-spacing: -0.02em;
                color: #1a1a1a;
                animation: floatShadow 3s ease-in-out infinite;
                position: relative;
                z-index: 2;
            }

            .glitch-red {
                position: absolute;
                top: 0;
                left: 0;
                font-size: clamp(60px, 12vw, 130px);
                font-weight: 900;
                letter-spacing: -0.02em;
                color: #ff3366;
                mix-blend-mode: screen;
                animation: tearRed 2.4s infinite
                    cubic-bezier(0.25, 0.1, 0.15, 1.2);
                pointer-events: none;
                z-index: 5;
                text-shadow: 0 0 3px rgba(255, 51, 102, 0.5);
            }

            .glitch-cyan {
                position: absolute;
                top: 0;
                left: 0;
                font-size: clamp(60px, 12vw, 130px);
                font-weight: 900;
                letter-spacing: -0.02em;
                color: #33ffff;
                mix-blend-mode: screen;
                animation: tearCyan 2.8s infinite
                    cubic-bezier(0.3, 0.05, 0.2, 1.1);
                pointer-events: none;
                z-index: 6;
                text-shadow: 0 0 4px rgba(51, 255, 255, 0.6);
            }

            .glitch-fragment {
                position: absolute;
                top: 0;
                left: 0;
                font-size: clamp(60px, 12vw, 130px);
                font-weight: 900;
                letter-spacing: -0.02em;
                color: #d9d9f0;
                mix-blend-mode: overlay;
                animation: tearFrag 3.2s infinite ease-in-out;
                pointer-events: none;
                z-index: 4;
                opacity: 0.35;
                text-shadow: 0 0 8px #8f9fff;
            }

            .notfound {
                font-size: clamp(1.8rem, 6vw, 2.8rem);
                font-weight: 800;
                color: #1a1a1a;
                margin-top: 0.5rem;
                text-shadow:
                    1px 1px 3px rgba(0, 0, 0, 0.06),
                    -1px -1px 2px rgba(255, 255, 255, 0.6);
            }

            .wrapper .btn {
                display: inline-block;
                margin-top: 2rem;
                padding: 0.7rem 1.5rem;
                background: #2a2a28;
                color: #e8e6df;
                text-decoration: none;
                font-weight: 700;
                box-shadow:
                    3px 3px 8px rgba(0, 0, 0, 0.2),
                    -1px -1px 3px rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.1);
                transition: all 0.08s linear;
                font-family: monospace;
                letter-spacing: 0.5px;
            }

            .wrapper .btn:active {
                transform: translate(2px, 2px);
                box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.2);
            }

            .title-right {
                font-size: clamp(1rem, 3vw, 1.2rem);
                font-weight: 700;
                letter-spacing: 2px;
                color: #1a1a1a;
                margin-bottom: 1rem;
                text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
            }

            .typewriter-area {
                font-size: clamp(0.85rem, 2.5vw, 1rem);
                line-height: 1.7;
                color: #1a1a1a;
                font-family: "Nimbus Mono PS", "Courier New", monospace;
                text-shadow: 0 1px 0 rgba(255, 255, 255, 0.3);
                width: 100%;
            }

            #reason-text {
                white-space: pre-wrap;
                word-break: break-word;
                width: 100%;
            }

            .cursor {
                display: inline-block;
                width: 8px;
                height: 1.2rem;
                background-color: #1a1a1a;
                margin-left: 3px;
                animation: blink 1s step-end infinite;
                vertical-align: middle;
            }

            @media (max-width: 500px) {
                .wrapper {
                    flex-direction: column;
                    align-items: center;
                    gap: 1.5rem;
                }
                .vertical-line {
                    width: min(280px, 60%);
                    height: 5px;
                }
                .left {
                    text-align: center;
                    width: 100%;
                }
                .right {
                    width: 100%;
                }
            }
        </style>
    </head>
    <body>
        <div id="vanta-bg"></div>

        <div class="wrapper">
            <div class="left">
                <div>
                    <span class="emoticon">:/ </span>
                    <div class="number-wrapper" style="display: inline-block">
                        <span class="number-base">404</span>
                        <span class="glitch-red" aria-hidden="true">404</span>
                        <span class="glitch-cyan" aria-hidden="true">404</span>
                        <span class="glitch-fragment" aria-hidden="true"
                            >404</span
                        >
                    </div>
                </div>
                <div class="notfound">Not found?</div>
                <a href="/error/" class="btn">← Return</a>
            </div>
            <div class="vertical-line"></div>
            <div class="right">
                <div class="title-right">possibilities:</div>
                <div class="typewriter-area">
                    <div id="reason-text"></div>
                </div>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.clouds.min.js"></script>
        <script>
            VANTA.CLOUDS({
                el: "#vanta-bg",
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.0,
                minWidth: 200.0,
                skyColor: 0x4d7ac8,
                cloudColor: 0xcdcdd9,
                cloudShadowColor: 0x194b7f,
                sunColor: 0xd90000,
                sunGlareColor: 0xcd370a,
                sunlightColor: 0xa05e2f,
                speed: 2.4,
            });

            const paragraph =
                "You typed the address by hand and missed a character. The link you clicked was cut off or wrapped badly. The page was published to a different slug than expected. A trailing slash changed the meaning of the path. The resource exists but at a renamed location. The URL contains an invisible character or encoding quirk. The link was generated from outdated documentation. The redirect chain broke somewhere between here and there. The asset was archived and never restored. You're looking for something that was never placed here to begin with.";

            let i = 0;
            const container = document.getElementById("reason-text");
            let built = "";
            let active = true;

            const WORDS_PER_SEC = 10;
            const avgWordLen = 5;
            const charsPerSec = WORDS_PER_SEC * avgWordLen;
            const msPerChar = 1000 / charsPerSec;

            function typeChar() {
                if (!active) return;
                if (i < paragraph.length) {
                    built += paragraph[i];
                    container.innerHTML =
                        built + '<span class="cursor"></span>';
                    i++;
                    setTimeout(typeChar, msPerChar + (Math.random() * 6 - 3));
                } else {
                    const cur = document.querySelector(".cursor");
                    if (cur) cur.style.display = "none";
                    active = false;
                }
            }

            setTimeout(typeChar, 400);

            const glitchEls = document.querySelectorAll(
                ".glitch-red, .glitch-cyan, .glitch-fragment",
            );
            glitchEls.forEach((el) => {
                el.style.willChange = "transform, clip-path, opacity";
            });
        </script>
    </body>
</html>
